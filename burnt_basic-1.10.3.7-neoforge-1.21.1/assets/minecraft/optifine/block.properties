# Burnt mod — OptiFine shader compatibility hints
# Maps burnt mod blocks to vanilla equivalents so shaders apply
# the correct wave animations without needing manual entries.

# ── Leaves (wave as oak leaves) ───────────────────────────────
block.leaves=minecraft:oak_leaves \
  burnt:smoldering_leaves \
  burnt:smoldering_leaves_2 \
  burnt:smoldering_leaves_3 \
  burnt:smoldering_leaves_4 \
  burnt:smoldering_leaves_5 \
  burnt:smoldering_oak_leaves \
  burnt:smoldering_birch_leaves \
  burnt:smoldering_spruce_leaves \
  burnt:smoldering_acacia_leaves \
  burnt:smoldering_jungle_leaves \
  burnt:smoldering_dark_oak_leaves \
  burnt:smoldering_cherry_leaves \
  burnt:smoldering_mangrove_leaves \
  burnt:burnt_leaves \
  burnt:blast_leaves

# ── Grass / short plants (wave as short grass) ────────────────
block.grass=minecraft:short_grass \
  burnt:tall_grass_fire \
  burnt:tall_grass_burnt \
  burnt:smoldering_grass_start \
  burnt:smoldering_grass \
  burnt:smoldering_high_grass \
  burnt:burnt_high_grass

# ── Tall plants (wave as tall grass) ──────────────────────────
block.tallgrass=minecraft:tall_grass \
  burnt:double_tall_grass_fire

# ── Foliage / hanging plants ──────────────────────────────────
block.foliage=minecraft:vine \
  burnt:burnt_vine \
  burnt:smoldering_moss \
  burnt:smoldering_moss_carpet \
  burnt:burnt_moss_carpet
